[build_ext]
# Always prefer vendored libraries over system libraries
# Set LDCOV_USE_SYSTEM_LIBS=1 to override this behavior
inplace = 1

[sdist]
# Include vendored library source files in source distributions
formats = gztar

[bdist_wheel]
# Build platform-specific wheels (contains compiled extensions)
universal = 0

[flake8]
max-line-length = 100
exclude = __pycache__,build,dist,*.egg-info,.git,ldcov/io/bgen/zlib-ng,ldcov/io/bgen/zstd
# F824: Ignore "unused global" warnings as we use globals correctly
ignore = F824