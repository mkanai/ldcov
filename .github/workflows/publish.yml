name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # build the distributions on demand without publishing

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so setuptools_scm sees the tag

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish when a GitHub Release is published (not on workflow_dispatch).
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
